name: Stream Massive GGUF to GCS

on:
  workflow_dispatch:
    inputs:
      hf_repo_id:
        description: 'Hugging Face Repo ID'
        required: true
        default: 'tiiuac/Falcon-H1-Tiny-90M-Instruct-GGUF'
      gguf_filename:
        description: 'Exact GGUF Filename'
        required: true
        default: 'Falcon-H1-Tiny-90M-Instruct-Q4_K_M.gguf'
      gcs_bucket:
        description: 'Target GCS Bucket Name'
        required: true
      gcs_path_prefix:
        description: 'Folder path inside GCS bucket'
        required: false
        default: 'gguf_models/'

jobs:
  stream_transfer:
    runs-on: ubuntu-latest
    # FORCE Global Environment Injection for the entire container lifecycle
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Upgraded to 3.11 to silence the Google deprecation warning

    - name: Install Dependencies
      run: |
        pip install requests google-cloud-storage

    - name: Authenticate to Google Cloud
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Run Memory-Streaming Script
      run: |
        python download_and_upload.py \
          --repo_id "${{ github.event.inputs.hf_repo_id }}" \
          --filename "${{ github.event.inputs.gguf_filename }}" \
          --bucket "${{ github.event.inputs.gcs_bucket }}" \
          --prefix "${{ github.event.inputs.gcs_path_prefix }}"
