name: Stream Massive GGUF to GCS

on:
  workflow_dispatch:
    inputs:
      hf_repo_id:
        description: 'Hugging Face Repo ID'
        required: true
        default: ''
      gguf_filename:
        description: 'Exact GGUF Filename'
        required: true
        default: ''
      gcs_bucket:
        description: 'Target GCS Bucket Name'
        required: true
        default: 'llms_models'
      gcs_path_prefix:
        description: 'Folder path inside GCS bucket'
        required: false
        default: 'gguf_models/'
      hf_token_direct:
        description: 'OPTIONAL: Paste HF Token directly here if GitHub Secrets fail'
        required: false
        default: ''

jobs:
  stream_transfer:
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install requests google-cloud-storage

    - name: Authenticate to Google Cloud
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Run Memory-Streaming Script
      env:
        # Uses the manual input box if filled; otherwise falls back to GitHub Repository Secrets
        HF_TOKEN: ${{ github.event.inputs.hf_token_direct || secrets.HF_TOKEN }}
      run: |
        python download_and_upload.py \
          --repo_id "${{ github.event.inputs.hf_repo_id }}" \
          --filename "${{ github.event.inputs.gguf_filename }}" \
          --bucket "${{ github.event.inputs.gcs_bucket }}" \
          --prefix "${{ github.event.inputs.gcs_path_prefix }}"
